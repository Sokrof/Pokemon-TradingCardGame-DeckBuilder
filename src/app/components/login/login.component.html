<!DOCTYPE html> 
<html lang="en"> 
<head>
    <meta charset="UTF-8"> 
    <title>Login 01</title> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configuración de la vista para dispositivos -->
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- Prefetch de recursos -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- Prefetch de recursos con crossorigin -->
    <!-- Vinculación de la fuente Mulish desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Mulish&display=swap" rel="stylesheet">
    <!-- Vinculación de la hoja de estilos externa -->
    <link rel="stylesheet" href="login.component.css">
</head>
<body>
    <!-- Contenedor de fondo -->
    <div class="background"></div>
    <!-- Contenedor centralizado -->
    <div class="centering">
        <!-- Formulario -->
        <form class="my-form">
            <!-- Fila de bienvenida -->
            <div class="login-welcome-row">
                <!-- Imagen de bienvenida -->
                <img
                    class="login-welcome"
                    src="/assets/pokecoin.png"
                    alt="Astronaut"
                >
                <h1>LogIn!</h1> <!-- Título del formulario -->
            </div>
            <!-- Campo de texto para el correo electrónico -->
            <div class="text-field">
                <label for="email">Email:</label>
                <input
                    aria-label="Email"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email"
                    required
                >
                <!-- Icono para el correo electrónico -->
                <img
                    alt="Email Icon"
                    src="/assets/email.png"
                    alt="Astronaut"
                >
            </div>
            <!-- Campo de texto para la contraseña -->
            <div class="text-field">
                <label for="password">Contraseña:</label>
                <input
                    id="password"
                    type="password"
                    aria-label="Password"
                    name="password"
                    placeholder="Contraseña"
                    title="Minimum 6 characters at least 1 Alphabet and 1 Number"
                    pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$"
                    required
                >
                <!-- Icono para la contraseña -->
                <img
                    alt="Password Icon"
                    src="/assets/password.png"
                    alt="Astronaut"
                >
            </div>
            <!-- Botón de inicio de sesión -->
            <input type="submit" class="my-form__button" value="Login" >
            <!-- Acciones del formulario -->
            <div class="my-form__actions">
                <!-- Fila de acción: Restablecer contraseña -->
                <div class="my-form__row">
                    <span>¿Olvidaste tu contraseña?</span>
                    <a href="#" title="Reset Password">Restablecer contraseña</a>
                </div>
                <!-- Fila de acción: Crear cuenta -->
                <div class="my-form__signup">
                    <a href="#" title="Create Account">Crear Cuenta</a>
                </div>
            </div>
        </form>
    </div>
    <!-- Vinculación del archivo de script -->
    <script src="script.js"></script>
</body>
</html>
